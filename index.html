<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MS-ADIC | AI Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: radial-gradient(circle at top, #1e293b, #0f172a); min-height: 100vh; color: white; display: flex; align-items: center; justify-content: center; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 40px; width: 100%; max-width: 450px; text-align: center; }
    </style>
</head>
<body>
    <div class="glass shadow-2xl">
        <h1 class="text-3xl font-black mb-2 text-blue-500">MS-ADIC AI</h1>
        <p class="text-slate-400 mb-8 font-medium">Image to Realistic Video</p>
        
        <input type="file" id="imgInput" accept="image/*" class="block w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-blue-600 file:text-white mb-6">
        
        <button id="btn" onclick="run()" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-bold transition-all transform active:scale-95">
            GENERATE VIDEO ✨
        </button>
        
        <p id="st" class="mt-4 text-blue-400 font-medium"></p>
        <video id="vid" class="mt-6 hidden w-full rounded-xl shadow-lg border border-white/10" controls autoplay loop></video>
    </div>

    <script>
        async function run() {
            const fileInput = document.getElementById('imgInput');
            if (!fileInput.files[0]) return alert("Select a photo first!");
            
            const btn = document.getElementById('btn');
            const status = document.getElementById('st');
            const video = document.getElementById('vid');

            btn.disabled = true;
            status.innerText = "Compressing Image...";

            const reader = new FileReader();
            reader.readAsDataURL(fileInput.files[0]);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = async () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 512; canvas.height = 288;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, 512, 288);
                    const smallBase64 = canvas.toDataURL('image/jpeg', 0.6);

                    status.innerText = "AI Generating (approx 45s)...";
                    try {
                        const res = await fetch('/api/generate', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ image: smallBase64 })
                        });
                        const data = await res.json();
                        if (data.url) {
                            video.src = data.url;
                            video.classList.remove('hidden');
                            status.innerText = "Success! ✅";
                        } else { status.innerText = "AI Error: " + (data.error || "Busy"); }
                    } catch (err) { status.innerText = "Connection failed. Check Internet!"; }
                    finally { btn.disabled = false; }
                };
            };
        }
    </script>
</body>
</html>
