<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>MS-ADIC | AI Animation</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white flex items-center justify-center min-h-screen">
    <div class="p-10 bg-slate-900 rounded-3xl border border-slate-800 w-full max-w-md text-center">
        <h1 class="text-4xl font-black text-blue-500 mb-2">MS-ADIC AI</h1>
        <p class="text-slate-500 mb-8 text-xs uppercase tracking-widest font-bold">Text to Animated Video</p>
        
        <textarea id="prompt" placeholder="Describe your animation (e.g. A cat dancing in 3D)..." class="w-full bg-slate-800 p-4 rounded-xl border border-slate-700 mb-6 h-32 focus:border-blue-500 outline-none"></textarea>
        
        <button id="btn" onclick="generate()" class="w-full bg-blue-600 py-4 rounded-xl font-bold hover:bg-blue-500 transition transform active:scale-95">
            GENERATE ANIMATION ✨
        </button>
        
        <div id="st" class="mt-6 text-blue-400 font-medium"></div>
        <video id="vid" class="mt-6 hidden w-full rounded-2xl shadow-2xl" controls autoplay loop></video>
    </div>

    <script>
        async function generate() {
            const prompt = document.getElementById('prompt').value;
            if (!prompt) return alert("Write a prompt first!");
            
            const btn = document.getElementById('btn');
            const status = document.getElementById('st');
            const video = document.getElementById('vid');

            btn.disabled = true;
            video.classList.add('hidden');
            status.innerText = "Step 1: Sending request...";

            try {
                // 1. Submit Request
                const res = await fetch('/api/animate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt })
                });
                const { jobId, error } = await res.json();
                if (error) throw new Error(error);

                // 2. Start Polling (Ask every 10 seconds)
                status.innerText = "Step 2: AI is animating (Wait 1-2 mins)...";
                const timer = setInterval(async () => {
                    const sRes = await fetch('/api/animate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ jobId: jobId })
                    });
                    const sData = await sRes.json();

                    if (sData.status === 'SUCCEED') {
                        clearInterval(timer);
                        video.src = sData.video_url;
                        video.classList.remove('hidden');
                        status.innerText = "Done! ✅";
                        btn.disabled = false;
                    } else if (sData.status === 'FAILED') {
                        clearInterval(timer);
                        status.innerText = "AI Failed. Check Credits.";
                        btn.disabled = false;
                    }
                }, 10000);

            } catch (e) { 
                alert("Error: " + e.message); 
                btn.disabled = false;
                status.innerText = "";
            }
        }
    </script>
</body>
</html>
