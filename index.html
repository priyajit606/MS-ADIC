<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>MS-ADIC AI Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: sans-serif; }
        .glass { background: #1e293b; padding: 40px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; border: 1px solid #334155; }
    </style>
</head>
<body>
    <div class="glass shadow-2xl">
        <h1 class="text-3xl font-bold text-blue-500 mb-2">MS-ADIC AI</h1>
        <p class="text-slate-400 mb-8">Image to Realistic Video</p>
        <input type="file" id="imgInput" accept="image/*" class="block w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-blue-600 file:text-white mb-6">
        <button id="btn" onclick="run()" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-bold transition-all active:scale-95">GENERATE VIDEO ✨</button>
        <p id="st" class="mt-4 text-blue-400 font-medium"></p>
        <video id="vid" class="mt-6 hidden w-full rounded-xl shadow-lg border border-white/10" controls autoplay loop></video>
    </div>

    <script>
        async function run() {
            const fileInput = document.getElementById('imgInput');
            if (!fileInput.files[0]) return alert("Select a photo!");
            const btn = document.getElementById('btn');
            const status = document.getElementById('st');
            const video = document.getElementById('vid');

            btn.disabled = true;
            status.innerText = "Step 1: Compressing Image...";

            const reader = new FileReader();
            reader.readAsDataURL(fileInput.files[0]);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = async () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 512; canvas.height = 288;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, 512, 288);
                    const smallBase64 = canvas.toDataURL('image/jpeg', 0.6);

                    status.innerText = "Step 2: Sending to AI...";
                    try {
                        const res = await fetch('/api/generate', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ image: smallBase64 })
                        });
                        const { jobId, error } = await res.json();
                        if (error) throw new Error(error);

                        // --- POLLING LOGIC ---
                        status.innerText = "Step 3: AI Working (Wait 60s)...";
                        const checkStatus = setInterval(async () => {
                            const sRes = await fetch('/api/generate', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ jobId: jobId })
                            });
                            const sData = await sRes.json();
                            
                            if (sData.status === 'SUCCEED') {
                                clearInterval(checkStatus);
                                video.src = sData.video_url || sData.url;
                                video.classList.remove('hidden');
                                status.innerText = "Complete! ✅";
                                btn.disabled = false;
                            } else if (sData.status === 'FAILED') {
                                clearInterval(checkStatus);
                                status.innerText = "AI Failed. Try again.";
                                btn.disabled = false;
                            }
                        }, 10000); // Check every 10 seconds

                    } catch (err) { 
                        alert("Error: " + err.message); 
                        btn.disabled = false; 
                        status.innerText = "";
                    }
                };
            };
        }
    </script>
</body>
</html>
