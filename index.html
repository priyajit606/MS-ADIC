<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>MS-ADIC AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white flex items-center justify-center min-h-screen">
    <div class="bg-slate-800 p-8 rounded-2xl shadow-xl w-full max-w-md text-center">
        <h1 class="text-3xl font-bold mb-6">🎬 MS-ADIC Studio</h1>
        <input type="file" id="img" accept="image/*" class="mb-4 block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-blue-50 file:text-blue-700">
        <button onclick="run()" id="btn" class="w-full bg-blue-600 py-3 rounded-lg font-bold hover:bg-blue-500 transition">GENERATE VIDEO</button>
        <p id="st" class="mt-4 text-slate-400"></p>
        <video id="v" class="mt-6 hidden w-full rounded-lg" controls autoplay loop></video>
    </div>
    <script>
        async function run() {
            const i = document.getElementById('img').files[0];
            if (!i) return alert("Upload photo!");
            const btn = document.getElementById('btn');
            btn.disabled = true;
            document.getElementById('st').innerText = "Processing... (approx 45s)";
            
            const r = new FileReader();
            r.readAsDataURL(i);
            r.onload = async () => {
                try {
                    const res = await fetch('/api/generate', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ image: r.result })
                    });
                    const d = await res.json();
                    if (d.url) {
                        document.getElementById('v').src = d.url;
                        document.getElementById('v').classList.remove('hidden');
                    } else { alert("AI Error: " + (d.error || "Busy")); }
                } catch (e) { alert("Connection failed. Try a smaller photo!"); }
                finally { btn.disabled = false; document.getElementById('st').innerText = ""; }
            };
        }
    </script>
</body>
</html>
