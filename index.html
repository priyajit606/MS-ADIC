<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>MS-ADIC AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: #1e293b; padding: 30px; border-radius: 20px; text-align: center; width: 100%; max-width: 400px; }
    </style>
</head>
<body>
    <div class="card shadow-2xl">
        <h1 class="text-3xl font-bold text-blue-500 mb-6">MS-ADIC AI</h1>
        <input type="file" id="img" accept="image/*" class="mb-6 block w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-blue-600 file:text-white">
        <button id="btn" onclick="start()" class="w-full bg-blue-600 py-3 rounded-xl font-bold hover:bg-blue-500 transition">GENERATE VIDEO</button>
        <p id="msg" class="mt-4 text-blue-400"></p>
        <video id="vid" class="mt-6 hidden w-full rounded-lg" controls autoplay loop></video>
    </div>

    <script>
        async function start() {
            const file = document.getElementById('img').files[0];
            if (!file) return alert("Select photo!");
            
            const btn = document.getElementById('btn');
            const msg = document.getElementById('msg');
            const vid = document.getElementById('vid');

            btn.disabled = true;
            msg.innerText = "Step 1: Preparing AI...";

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async (e) => {
                try {
                    // Send to API
                    const res = await fetch('/api/generate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ image: e.target.result })
                    });
                    const { jobId, error } = await res.json();
                    if (error) throw new Error(error);

                    // Start checking every 10 seconds
                    msg.innerText = "Step 2: AI Generating (Wait 60s)...";
                    const timer = setInterval(async () => {
                        const sRes = await fetch('/api/generate', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ jobId: jobId })
                        });
                        const sData = await sRes.json();

                        if (sData.status === 'SUCCEED') {
                            clearInterval(timer);
                            vid.src = sData.video_url;
                            vid.classList.remove('hidden');
                            msg.innerText = "Complete! ✅";
                            btn.disabled = false;
                        } else if (sData.status === 'FAILED') {
                            clearInterval(timer);
                            msg.innerText = "AI Failed. Check Credits.";
                            btn.disabled = false;
                        }
                    }, 10000);

                } catch (err) {
                    alert(err.message);
                    btn.disabled = false;
                    msg.innerText = "";
                }
            };
        }
    </script>
</body>
</html>
