<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MS-ADIC | Cinematic AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: radial-gradient(circle at top, #1e293b, #0f172a); min-height: 100vh; color: white; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; }
        .btn-shimmer { background: linear-gradient(90deg, #3b82f6, #8b5cf6, #3b82f6); background-size: 200% auto; animation: shine 3s linear infinite; }
        @keyframes shine { to { background-position: 200% center; } }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4">
    <div class="glass p-8 w-full max-w-lg text-center">
        <h1 class="text-3xl font-bold mb-4">🎬 MS-ADIC Studio</h1>
        <p class="text-gray-400 mb-6">Convert Images to High-Quality Video</p>
        
        <input type="file" id="imgIn" accept="image/*" class="block w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 mb-6">
        
        <button id="genBtn" onclick="start()" class="btn-shimmer w-full py-3 rounded-lg font-bold text-white shadow-lg transform active:scale-95 transition-all">
            GENERATE VIDEO ✨
        </button>
        
        <div id="loader" class="hidden mt-6 text-blue-400">⚡ AI is generating (approx 45s)...</div>
        <video id="vidOut" class="hidden mt-6 rounded-lg w-full shadow-2xl" controls autoplay loop></video>
    </div>

    <script>
        async function start() {
            const input = document.getElementById('imgIn');
            const loader = document.getElementById('loader');
            const video = document.getElementById('vidOut');
            const btn = document.getElementById('genBtn');

            if (!input.files[0]) return alert("Please select a photo!");
            
            btn.disabled = true;
            loader.classList.remove('hidden');
            video.classList.add('hidden');

            const reader = new FileReader();
            reader.readAsDataURL(input.files[0]);
            reader.onload = async () => {
                try {
                    const res = await fetch('/api/generate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ image: reader.result })
                    });
                    const data = await res.json();
                    if (data.url) {
                        video.src = data.url;
                        video.classList.remove('hidden');
                    } else { alert("AI Busy or Error: " + data.error); }
                } catch (e) { alert("Connection failed. Try a smaller image!"); }
                finally { btn.disabled = false; loader.classList.add('hidden'); }
            };
        }
    </script>
</body>
</html>
